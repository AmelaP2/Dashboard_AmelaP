<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Productivity Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <header class="dashboard-header">
            <h1 id="greeting">Hello!</h1>
            <p id="date-time"></p>
        </header>

        <div class="grid-layout">
            <section class="card timer-card">
                <h2>Focus Timer</h2>
                <div class="timer-display" id="timer-display">25:00</div>
                
                <div class="timer-settings">
                    <label for="timer-duration">Duration (min): </label>
                    <input type="number" id="timer-duration" value="25" min="1" max="60">
                </div>

                <div class="timer-controls">
                    <button id="btn-start" class="btn btn-success">Start</button>
                    <button id="btn-stop" class="btn btn-danger" disabled>Stop</button>
                    <button id="btn-reset" class="btn btn-secondary">Reset</button>
                </div>
            </section>

            <section class="card todo-card">
                <h2>To-Do List</h2>
                
                <form id="todo-form" class="todo-form">
                    <input type="text" id="todo-input" placeholder="Add a new task..." required>
                    <button type="submit" class="btn btn-primary">Add</button>
                </form>
                
                <div class="todo-sort">
                    <label for="sort-select">Sort by: </label>
                    <select id="sort-select">
                        <option value="newest">Newest</option>
                        <option value="oldest">Oldest</option>
                        <option value="alphabetical">A - Z</option>
                        <option value="completed">Completed First</option>
                    </select>
                </div>

                <ul id="todo-list" class="todo-list"></ul>
            </section>

            <section class="card links-card">
                <h2>Quick Links</h2>
                <form id="link-form" class="link-form">
                    <input type="text" id="link-name" placeholder="Website Name" required>
                    <input type="url" id="link-url" placeholder="URL (https://...)" required>
                    <button type="submit" class="btn btn-primary">Add Link</button>
                </form>
                <div id="links-container" class="links-container"></div>
            </section>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
